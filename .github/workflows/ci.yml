name: CI Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]


permissions :
contents :ready


jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff pytest bandit

      - name: Lint
        run: ruff check .

      - name: Security Scan
        run: bandit -r .

      - name: Run Tests
        run: pytest
